# ============================================================
# tmux.conf
# Plugins managed by tpm — install: prefix + I, update: prefix + U
# (pin bootstraps tpm on a new machine)
# ============================================================

# ---- prefix: Ctrl-A (screen-style); double-tap sends a literal Ctrl-A ----
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# ---- general ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -g escape-time 10
set -g focus-events on
set-option -g set-titles on
set -g update-environment -r

# ---- terminal: true colour + italic support ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---- vi-style copy mode + system clipboard ----
setw -g mode-keys vi
set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ---- vi-style pane navigation (prefix + Ctrl-h/j/k/l) ----
unbind l
bind-key -r C-k select-pane -U
bind-key -r C-j select-pane -D
bind-key -r C-h select-pane -L
bind-key -r C-l select-pane -R

# ---- vi-style resizing (prefix + H/J/K/L) ----
bind-key -r K resize-pane -U
bind-key -r J resize-pane -D
bind-key -r H resize-pane -L
bind-key -r L resize-pane -R

# ---- intuitive splits, opening in current pane's cwd ----
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---- reload config ----
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---- rotation ----
unbind C-o
bind R rotate-window

# ---- move current window to front ----
bind T swap-window -t 1

# ============================================================
# plugins (tpm)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.2'

# catppuccin (latte = light)
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_status_style 'rounded'

# minimal status line; catppuccin handles styling
set -g status-position bottom
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_session}"

# initialize tpm — must be at bottom
run '~/.tmux/plugins/tpm/tpm'
